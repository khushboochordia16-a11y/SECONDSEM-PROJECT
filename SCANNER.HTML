<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Scanner - Presentation Mode</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: transparent !important; font-family: 'DM Sans', sans-serif; }
        
        /* Invisible overlay covering the whole screen so you can tap anywhere */
        #click-catcher { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; cursor: pointer; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 20px; box-sizing: border-box; pointer-events: none; }
        
        .instruction { color:#c5a059; background:rgba(8, 8, 7, 0.85); padding:15px 30px; font-size: 11px; letter-spacing: 0.3em; border: 1px solid rgba(197, 160, 89, 0.4); text-align: center; }
        
        .btn-skip { background: #c5a059; color: #080807; border: none; padding: 15px 30px; font-size: 10px; font-weight: bold; cursor: pointer; pointer-events: auto; letter-spacing: 0.2em; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- 1. The camera runs in the background -->
    <a-scene mindar-image="imageTargetSrc: ./FINALPOSTER.MIND; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false" loading-screen="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- 2. We decouple the model from the tracker. It just floats hidden in front of the camera -->
        <a-entity id="fake-model" position="0 0 -3" visible="false">
            <a-light type="ambient" intensity="1.2"></a-light>
            <a-light type="directional" intensity="2.0" position="1 3 2"></a-light>
            <a-gltf-model rotation="0 90 0" scale="0.6 0.6 0.6" src="./radio1.glb" animation="property: rotation; to: 0 450 0; dur: 10000; loop: true; easing: linear"></a-gltf-model>
        </a-entity>
    </a-scene>

    <!-- 3. You tap this invisible layer to trigger the sequence -->
    <div id="click-catcher" onclick="triggerFakeScan()"></div>

    <div id="ui">
        <div class="instruction" id="status">TAP SCREEN TO SCAN POSTER</div>
        <button class="btn-skip" onclick="location.assign('./index.html')">FORCE SKIP TO MUSEUM</button>
    </div>

    <script>
        let hasScanned = false;

        function triggerFakeScan() {
            if(hasScanned) return; // Prevent double-clicking
            hasScanned = true;
            
            // Step 1: Change the text to make it look like it worked
            const statusBox = document.getElementById('status');
            statusBox.innerText = "POSTER RECOGNIZED...";
            statusBox.style.color = "#ffffff";
            statusBox.style.borderColor = "#ffffff";
            
            // Step 2: Force the 3D radio to appear instantly
            document.getElementById('fake-model').setAttribute('visible', 'true');
            
            // Step 3: Wait 2.5 seconds, then automatically go to the museum!
            setTimeout(() => {
                location.assign('./index.html');
            }, 2500);
        }
    </script>
</body>
</html>
